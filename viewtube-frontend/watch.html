<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ViewTube – Watch</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="nav-left">
      <button class="icon-btn" id="menuToggle"><span class="material-icons">menu</span></button>
      <a href="index.html" class="logo">
        <svg viewBox="0 0 90 20" class="logo-svg" xmlns="http://www.w3.org/2000/svg">
          <rect x="0" y="2" width="28" height="16" rx="4" fill="#FF0000"/>
          <polygon points="11,6 11,14 19,10" fill="white"/>
          <text x="32" y="16" font-family="Roboto,sans-serif" font-weight="700" font-size="13" fill="var(--text-primary)">ViewTube</text>
        </svg>
      </a>
    </div>
    <div class="nav-center">
      <div class="search-bar">
        <input type="text" placeholder="Search" aria-label="Search"/>
        <button class="search-btn"><span class="material-icons">search</span></button>
      </div>
    </div>
    <div class="nav-right">
      <button class="icon-btn"><span class="material-icons">video_call</span></button>
      <button class="icon-btn"><span class="material-icons">notifications</span><span class="badge">3</span></button>
      <div class="avatar">JD</div>
    </div>
  </header>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <nav class="sidebar-nav">
      <a href="index.html" class="nav-item"><span class="material-icons">home</span><span>Home</span></a>
      <a href="#" class="nav-item"><span class="material-icons">explore</span><span>Explore</span></a>
      <a href="#" class="nav-item"><span class="material-icons">subscriptions</span><span>Subscriptions</span></a>
      <div class="sidebar-divider"></div>
      <a href="#" class="nav-item"><span class="material-icons">video_library</span><span>Library</span></a>
      <a href="#" class="nav-item"><span class="material-icons">history</span><span>History</span></a>
      <a href="#" class="nav-item"><span class="material-icons">watch_later</span><span>Watch Later</span></a>
    </nav>
  </aside>

  <!-- WATCH PAGE LAYOUT -->
  <main class="watch-layout" id="mainContent">
    <div class="watch-left">

      <!-- Video Player -->
      <div class="video-player-wrap">
        <div class="video-player" id="videoPlayer">
          <div class="video-placeholder" id="videoPlaceholder">
            <span class="material-icons play-big">play_circle_filled</span>
            <p id="playerTitle">Loading video…</p>
          </div>
          <!-- Custom controls overlay -->
          <div class="player-controls" id="playerControls">
            <div class="progress-bar-wrap">
              <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:35%"></div></div>
            </div>
            <div class="controls-row">
              <div class="ctrl-left">
                <button class="ctrl-btn" id="playPauseBtn"><span class="material-icons">play_arrow</span></button>
                <button class="ctrl-btn"><span class="material-icons">skip_next</span></button>
                <button class="ctrl-btn" id="muteBtn"><span class="material-icons">volume_up</span></button>
                <span class="time-display">4:32 / 18:47</span>
              </div>
              <div class="ctrl-right">
                <button class="ctrl-btn"><span class="material-icons">subtitles</span></button>
                <button class="ctrl-btn"><span class="material-icons">settings</span></button>
                <button class="ctrl-btn" id="theaterBtn"><span class="material-icons">crop_landscape</span></button>
                <button class="ctrl-btn"><span class="material-icons">fullscreen</span></button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Video Info -->
      <div class="video-info">
        <h1 class="video-title-watch" id="watchTitle">Video Title</h1>
        <div class="video-meta-row">
          <span class="view-count" id="watchViews">0 views</span>
          <span class="dot">•</span>
          <span class="upload-date" id="watchDate">Just now</span>
        </div>

        <!-- Action Buttons -->
        <div class="action-buttons">
          <button class="action-btn" id="likeBtn">
            <span class="material-icons">thumb_up</span>
            <span id="likeCount">0</span>
          </button>
          <button class="action-btn" id="dislikeBtn">
            <span class="material-icons">thumb_down</span>
            <span>Dislike</span>
          </button>
          <button class="action-btn" data-action="share">
            <span class="material-icons">share</span>
            <span>Share</span>
          </button>
          <button class="action-btn" data-action="save">
            <span class="material-icons">add_to_queue</span>
            <span>Save</span>
          </button>
          <button class="action-btn">
            <span class="material-icons">more_horiz</span>
          </button>
        </div>

        <!-- Channel Info -->
        <div class="channel-row">
          <div class="channel-avatar-big" id="channelAvatarBig">C</div>
          <div class="channel-details">
            <p class="channel-name-big" id="watchChannelName">Channel</p>
            <p class="subscriber-count" id="watchSubs">0 subscribers</p>
          </div>
          <button class="subscribe-btn" id="subscribeBtn">Subscribe</button>
        </div>

        <!-- Description -->
        <div class="description-box" id="descriptionBox">
          <p id="videoDescription">No description available.</p>
          <button class="show-more-btn" id="showMoreBtn">Show more</button>
        </div>
      </div>

      <!-- Comments -->
      <div class="comments-section">
        <h3 class="comments-heading"><span id="commentCount">0</span> Comments</h3>
        <div class="add-comment">
          <div class="avatar small">JD</div>
          <input type="text" class="comment-input" id="commentInput" placeholder="Add a comment…"/>
          <button class="comment-submit" id="commentSubmit">Post</button>
        </div>
        <div class="comments-list" id="commentsList"></div>
      </div>
    </div>

    <!-- RIGHT: Recommended Videos -->
    <div class="watch-right">
      <h3 class="up-next-title">Up Next</h3>
      <div id="recommendedList"></div>
    </div>
  </main>

<script src="data-thumbs-complete.js"></script>
<script src="data.js"></script>
  <script src="watch.js"></script>
</body>
</html>
