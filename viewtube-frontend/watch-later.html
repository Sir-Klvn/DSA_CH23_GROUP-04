<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Watch Later – ViewTube</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="nav-left">
      <button class="icon-btn" id="menuToggle"><span class="material-icons">menu</span></button>
      <a href="index.html" class="logo">
        <svg viewBox="0 0 90 20" class="logo-svg" xmlns="http://www.w3.org/2000/svg">
          <rect x="0" y="2" width="28" height="16" rx="4" fill="#FF0000"/>
          <polygon points="11,6 11,14 19,10" fill="white"/>
          <text x="32" y="16" font-family="Roboto,sans-serif" font-weight="700" font-size="13" fill="var(--text-primary)">ViewTube</text>
        </svg>
      </a>
    </div>
    <div class="nav-center">
      <div class="search-bar">
        <input type="text" placeholder="Search Watch Later" aria-label="Search"/>
        <button class="search-btn"><span class="material-icons">search</span></button>
      </div>
    </div>
    <div class="nav-right">
      <div class="avatar">JD</div>
    </div>
  </header>

  <!-- SIDEBAR - Watch Later Active -->
  <aside class="sidebar" id="sidebar">
    <nav class="sidebar-nav">
      <a href="index.html" class="nav-item"><span class="material-icons">home</span><span>Home</span></a>
      <a href="#" class="nav-item"><span class="material-icons">explore</span><span>Explore</span></a>
      <a href="#" class="nav-item"><span class="material-icons">subscriptions</span><span>Subscriptions</span></a>
      <div class="sidebar-divider"></div>
      <a href="library.html" class="nav-item"><span class="material-icons">video_library</span><span>Library</span></a>
      <a href="history.html" class="nav-item"><span class="material-icons">history</span><span>History</span></a>
      <a href="watch-later.html" class="nav-item active"><span class="material-icons">watch_later</span><span>Watch Later</span></a>
      <div class="sidebar-divider"></div>
      <a href="settings.html" class="nav-item"><span class="material-icons">settings</span><span>Settings</span></a>
    </nav>
  </aside>

  <!-- WATCH LATER CONTENT -->
  <main class="main-content">
    <div class="page-header">
      <h1>Watch Later</h1>
      <p>Videos you've saved to watch later <span class="section-count" id="savedCount">0</span></p>
      <button class="btn-danger" onclick="clearWatchLater()">Clear all</button>
    </div>

    <div class="video-grid" id="savedVideosGrid"></div>
    <p id="noSaved" style="padding:40px;color:var(--text-secondary);text-align:center;display:none;">
      No saved videos. <a href="index.html">Save some videos</a>
    </p>
  </main>

  <script src="data.js"></script>
  <script>
    let savedVideos = JSON.parse(localStorage.getItem('savedVideos') || '[]');

    function loadSavedVideos() {
      const grid = document.getElementById('savedVideosGrid');
      const count = document.getElementById('savedCount');
      const noSaved = document.getElementById('noSaved');
      
      count.textContent = savedVideos.length;
      
      if (savedVideos.length === 0) {
        grid.style.display = 'none';
        noSaved.style.display = 'block';
        return;
      }
      
      grid.style.display = 'grid';
      noSaved.style.display = 'none';
      
      grid.innerHTML = savedVideos.map(v => `
        <div class="video-card">
          <div class="thumbnail-wrap">
            <img src="${v.thumbnail}" class="thumbnail" alt="${v.title}" loading="lazy" />
            <div class="saved-badge">Saved • ${new Date(v.savedAt).toLocaleDateString()}</div>
            <div class="hover-overlay">
              <span class="material-icons">play_arrow</span>
            </div>
          </div>
          <div class="card-info">
            <p>${v.title}</p>
            <p>${v.channel}</p>
            <button class="btn-remove" onclick="removeSaved('${v.id}')">Remove</button>
          </div>
        </div>
      `).join('');
    }

    function removeSaved(id) {
      savedVideos = savedVideos.filter(v => v.id !== id);
      localStorage.setItem('savedVideos', JSON.stringify(savedVideos));
      loadSavedVideos();
    }

    function clearWatchLater() {
      if (confirm('Clear all saved videos?')) {
        savedVideos = [];
        localStorage.removeItem('savedVideos');
        loadSavedVideos();
      }
    }

    // Sidebar toggle
    document.getElementById('menuToggle').addEventListener('click', () => {
      document.getElementById('sidebar').classList.toggle('collapsed');
    });

    // Global save function (from watch.js)
    window.saveVideo = (video) => {
      const exists = savedVideos.some(v => v.id === video.id);
      if (!exists) {
        savedVideos.unshift({
          id: video.id,
          title: video.title,
          channel: video.channel,
          thumbnail: video.thumbnail,
          savedAt: new Date().toISOString()
        });
        localStorage.setItem('savedVideos', JSON.stringify(savedVideos));
        loadSavedVideos();
      }
    };

    // Initial load
    loadSavedVideos();
  </script>

  <style>
    .btn-danger {
      background: #ea4335;
      color: white;
      padding: 8px 16px;
      border-radius: var(--radius-full);
      font-weight: 500;
    }
    .btn-danger:hover { background: #db4437; }
    .btn-remove {
      background: var(--bg-hover);
      color: var(--text-secondary);
      padding: 4px 12px;
      border-radius: var(--radius-sm);
      font-size: 12px;
      margin-top: 4px;
    }
    .btn-remove:hover { background: #3f3f3f; color: var(--text-primary); }
    .saved-badge {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: rgba(0,0,0,0.8);
      color: var(--accent);
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }
  </style>
</body>
</html>
