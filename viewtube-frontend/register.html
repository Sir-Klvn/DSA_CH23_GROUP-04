<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create account – ViewTube</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
</head>
<body class="auth-page">

  <div class="auth-container">
    <div class="logo-large">
      <svg viewBox="0 0 90 20" xmlns="http://www.w3.org/2000/svg">
        <rect x="0" y="2" width="28" height="16" rx="4" fill="#FF0000"/>
        <polygon points="11,6 11,14 19,10" fill="white"/>
        <text x="32" y="16" font-family="Roboto,sans-serif" font-weight="700" font-size="13" fill="#f1f1f1">ViewTube</text>
      </svg>
    </div>

    <div class="auth-card">
      <h1>Create your account</h1>

      <form id="registerForm">
        <div class="form-group">
          <input type="text" id="regName" placeholder="Name" required>
        </div>
        <div class="form-group">
          <input type="email" id="regEmail" placeholder="Email address" required>
        </div>
        <div class="form-group">
          <input type="password" id="regPassword" placeholder="Password (min 6 chars)" minlength="6" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <select id="regRegion" required>
              <option value="">Select region</option>
              <option value="US">United States</option>
              <option value="KE">Kenya</option>
              <option value="GB">United Kingdom</option>
              <option value="IN">India</option>
              <option value="CA">Canada</option>
            </select>
          </div>
          <div class="form-group">
            <select id="regAgeGroup" required>
              <option value="">Age group</option>
              <option value="child">Under 13</option>
              <option value="teen">13-17</option>
              <option value="adult">18-34</option>
              <option value="mature">35+</option>
            </select>
          </div>
        </div>
        
        <!-- Onboarding interests -->
        <div class="interests-section">
          <p>Select topics you're interested in:</p>
          <div class="interest-tags">
            <label><input type="checkbox" name="interest" value="coding"> Coding/Tech</label>
            <label><input type="checkbox" name="interest" value="gaming"> Gaming</label>
            <label><input type="checkbox" name="interest" value="music"> Music</label>
            <label><input type="checkbox" name="interest" value="science"> Science</label>
            <label><input type="checkbox" name="interest" value="news"> News</label>
            <label><input type="checkbox" name="interest" value="sports"> Sports</label>
          </div>
        </div>

        <button type="submit" class="auth-btn primary">Create Account</button>
      </form>

      <div class="auth-links">
        <a href="login.html">Sign in instead</a>
      </div>

      <div class="auth-footer">
        <p>By creating an account, you agree to ViewTube's <a>Terms of Service</a> and <a>Privacy Policy</a></p>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const formData = {
        name: document.getElementById('regName').value,
        email: document.getElementById('regEmail').value,
        password: document.getElementById('regPassword').value,
        region: document.getElementById('regRegion').value,
        ageGroup: document.getElementById('regAgeGroup').value,
        interests: Array.from(document.querySelectorAll('input[name="interest"]:checked')).map(cb => cb.value)
      };

      try {
        const response = await fetch('http://localhost:3000/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(formData)
        });

        const result = await response.json();
        if (result.success) {
          localStorage.setItem('viewtubeUser', JSON.stringify(result.data.user));
          window.location.href = 'index.html';
        } else {
          alert('Registration failed: ' + result.error);
        }
      } catch (err) {
        alert('Network error. Is backend running on localhost:3000?');
      }
    });
  </script>

  <style>
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .interests-section { margin: 24px 0; padding: 20px; background: var(--bg-hover); border-radius: var(--radius-md); }
    .interests-section p { margin-bottom: 16px; color: var(--text-secondary); }
    .interest-tags {
      display: flex; flex-wrap: wrap; gap: 8px;
    }
    .interest-tags label {
      display: flex; align-items: center; gap: 6px;
      background: var(--bg-primary); padding: 8px 12px; border-radius: var(--radius-full);
      font-size: 14px; cursor: pointer; transition: background 0.2s;
    }
    .interest-tags input:checked + span { color: var(--accent); }
    .interest-tags label:hover { background: var(--bg-hover); }
  </style>
</body>
</html>
