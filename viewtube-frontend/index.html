<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ViewTube – Home</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
</head>
<body>

  <!-- ===== TOP NAVBAR ===== -->
  <header class="navbar"> 
    <div class="nav-left">
      <button class="icon-btn" id="menuToggle" aria-label="Menu">
        <span class="material-icons">menu</span>
      </button>
      <a href="index.html" class="logo">
        <svg viewBox="0 0 90 20" class="logo-svg" xmlns="http://www.w3.org/2000/svg">
          <rect x="0" y="2" width="28" height="16" rx="4" fill="#FF0000"/>
          <polygon points="11,6 11,14 19,10" fill="white"/>
          <text x="32" y="16" font-family="Roboto,sans-serif" font-weight="700" font-size="13" fill="var(--text-primary)">ViewTube</text>
        </svg>
      </a>
    </div>

    <div class="nav-center">
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search" aria-label="Search"/>
        <button class="search-btn" id="searchBtn" aria-label="Search">
          <span class="material-icons">search</span>
        </button>
      </div>
      <button class="icon-btn mic-btn" aria-label="Voice search">
        <span class="material-icons">mic</span>
      </button>
    </div>

    <div class="nav-right">
      <button class="icon-btn" aria-label="Upload">
        <span class="material-icons">video_call</span>
      </button>
      <button class="icon-btn" aria-label="Notifications" id="notifBtn">
        <span class="material-icons">notifications</span>
        <span class="badge">3</span>
      </button>
      <div class="avatar" title="Your Account">JD</div>
    </div>
  </header>

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar" id="sidebar">
    <nav class="sidebar-nav">
      <a href="index.html" class="nav-item active">
        <span class="material-icons">home</span><span>Home</span>
      </a>
      <a href="#" class="nav-item">
        <span class="material-icons">explore</span><span>Explore</span>
      </a>
      <a href="#" class="nav-item">
        <span class="material-icons">subscriptions</span><span>Subscriptions</span>
      </a>
      <div class="sidebar-divider"></div>
      <a href="library.html" class="nav-item">
        <span class="material-icons">video_library</span><span>Library</span>
      </a>
      <a href="history.html" class="nav-item">
        <span class="material-icons">history</span><span>History</span>
      </a>
      <a href="watch-later.html" class="nav-item">
        <span class="material-icons">watch_later</span><span>Watch Later</span>
      </a>
      <a href="#" class="nav-item">
        <span class="material-icons">thumb_up</span><span>Liked Videos</span>
      </a>
      <div class="sidebar-divider"></div>
      <p class="sidebar-section-title">SUBSCRIPTIONS</p>
      <a href="#" class="nav-item">
        <div class="channel-icon ci-red">T</div><span>TechWorld</span>
      </a>
      <a href="#" class="nav-item">
        <div class="channel-icon ci-blue">C</div><span>CodeWithMe</span>
      </a>
      <a href="#" class="nav-item">
        <div class="channel-icon ci-green">N</div><span>NatureHub</span>
      </a>
      <div class="sidebar-divider"></div>
      <a href="#" class="nav-item">
        <span class="material-icons">settings</span><span>Settings</span>
      </a>
      <a href="#" class="nav-item">
        <span class="material-icons">help_outline</span><span>Help</span>
      </a>
    </nav>
  </aside>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="main-content" id="mainContent">

    <!-- Category Chips -->
    <div class="chips-wrapper">
      <div class="chips" id="chips">
        <button class="chip active" data-cat="all">All</button>
        <button class="chip" data-cat="music">Music</button>
        <button class="chip" data-cat="gaming">Gaming</button>
        <button class="chip" data-cat="live">Live</button>
        <button class="chip" data-cat="coding">Coding</button>
        <button class="chip" data-cat="science">Science</button>
        <button class="chip" data-cat="news">News</button>
        <button class="chip" data-cat="sports">Sports</button>
        <button class="chip" data-cat="cooking">Cooking</button>
        <button class="chip" data-cat="travel">Travel</button>
      </div>
      <button class="refresh-btn" id="refreshBtn" title="Refresh trending videos">
        <span class="material-icons">refresh</span>
        <span>Refresh</span>
      </button>
    </div>

    <!-- Video Grid -->
    <div class="video-grid" id="videoGrid"></div>
  </main>

<script src="data-thumbs.js"></script>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
